<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solar & Crop Weather Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Agro-Processing & Solar Dashboard</h1>
        <div id="search-container">
            <input type="text" id="search-input" placeholder="Search cities (e.g., Kigali, Nairobi)...">
        </div>
    </header>

    <main>
        <div id="loading-state" class="state-box">Optimizing connection and fetching regional telemetry...</div>
        <div id="error-state" class="state-box hidden">
            <p>Execution halted: Network request failed.</p>
            <button id="retry-btn">Retry Connection</button>
        </div>
        <div id="empty-state" class="state-box hidden">No regional stations match your search.</div>

        <section id="grid-view" class="hidden">
            <div id="card-grid" class="grid-layout"></div>
        </section>

        <section id="detail-view" class="hidden">
            <button id="back-btn">← Back to Dashboard</button>
            <div id="detail-content"></div>
        </section>
    </main>

    <script type="module" src="main.js"></script>
</body>
</html>
